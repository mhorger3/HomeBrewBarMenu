<div class="beer-row">

  <div class="beer-left">

    <img
      class="beer-logo"
      [src]="beer().logoUrl || 'assets/logos/default-beer.png'"
      [alt]="beer().name"
      loading="lazy"
      onerror="this.src='assets/logos/default-beer.png'"
    />

    <div class="beer-text">

      <div class="beer-name">
        {{ beer().name }}
      </div>

      <div class="beer-sub">
        {{ beer().style }} • {{ beer().year }} • {{ beer().abv }}% ABV • {{ beer().volume }} • {{ beer().quantity }} bottles
      </div>

    </div>

  </div>

  <div class="beer-price">
    {{ beer().price }}
  </div>

</div>
