<div class="beer-card">

    <div class="tap">
        TAP {{ beer().tap }}
    </div>

    <div class="name">
        {{ beer().name }}
    </div>

    <div class="brewery">
        {{ beer().brewery }}
    </div>

    <div class="style">
        {{ beer().style }}
    </div>

    <div class="footer">

        <span>{{ beer().abv }}% ABV</span>

        <span>{{ beer().price }}</span>

    </div>

</div>
